name: vibecalc
description: A vibrant, multi-mode scientific calculator with graphing and unit conversion.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Math engine
  math_expressions: ^2.5.0

  # Graphing engine
  fl_chart: ^0.68.0

  # Animations
  flutter_staggered_animations: ^1.1.1

  # Persistence
  shared_preferences: ^2.2.3

  # Haptics
  vibration: ^1.8.4

  # SVG (if you later add vector icons)
  flutter_svg: ^2.0.10+1

  # Collection helpers
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
