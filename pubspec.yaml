name: vibecalc
description: A vibrant, multi-mode scientific calculator with graphing and unit conversion.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Math engine
  math_expressions: ^2.5.0

  # Graphing engine
  fl_chart: ^0.68.0

  # Animations
  flutter_staggered_animations: ^1.1.1

  # Persistence
  shared_preferences: ^2.2.3

  # Haptics
  vibration: ^1.8.4

  # SVG (if you later add vector icons)
  flutter_svg: ^2.0.10+1

  # Collection helpers
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App icon generator
  flutter_launcher_icons: ^0.13.1

  # Native splash generator
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/themes/

# ----------------------------
# Launcher Icon Configuration
# ----------------------------

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0F0F1A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

# ----------------------------
# Native Splash Configuration
# ----------------------------

flutter_native_splash:
  color: "#0F0F1A"
  image: assets/icons/app_icon.png
  android: true
  ios: true
  android_12:
    image: assets/icons/app_icon.png
    color: "#0F0F1A"