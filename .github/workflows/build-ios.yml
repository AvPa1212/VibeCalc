name: Build iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'latest'
        channel: 'stable'
    
    - name: Verify versions
      run: |
        flutter --version
        dart --version
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Verify Flutter setup and iOS dependencies
      run: flutter precache --ios
    
    - name: Build iOS app
      run: flutter build ios --release --no-codesign
    
    - name: Upload iOS build artifact
      uses: actions/upload-artifact@v3
      with:
        name: ios-build
        path: build/ios/iphoneos/Runner.app
        retention-days: 7

  build-ipa:
    runs-on: macos-latest
    needs: build-ios
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'latest'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Precache iOS
      run: flutter precache --ios
    
    - name: Build IPA (no code signing)
      run: flutter build ipa --release --no-codesign --export-method ad-hoc
      continue-on-error: true
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: ios-ipa
        path: build/ios/ipa/
        retention-days: 7
    
    - name: Upload build logs on failure
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: ios-build-logs
        path: |
          build/ios/
        retention-days: 7
